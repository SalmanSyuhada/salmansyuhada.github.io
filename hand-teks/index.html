<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Hand Particle</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
  color:white;
}

/* Kamera transparan lebih terang */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.45;
  transform:scaleX(-1);
  filter:brightness(1.2);
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

/* Input satu baris */
.control-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  padding:10px;
  display:flex;
  gap:10px;
  box-sizing:border-box;
}

.control-bar input{
  flex:1;
  padding:8px;
  background:#111;
  border:1px solid #00ffff55;
  color:#0ff;
  border-radius:6px;
  outline:none;
}

.control-bar input:focus{
  border-color:#0ff;
  box-shadow:0 0 10px #0ff55;
}

.guide{
  position:fixed;
  bottom:50px;
  width:100%;
  text-align:center;
  font-size:14px;
  color:#ccc;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="guide">
  ✋ Tangan terbuka = partikel menyebar |
  🤏 Jepit = bentuk teks |
  🤝 Dekatkan tangan = nama + tanggal
</div>

<div class="control-bar">
  <input id="rightText" placeholder="Teks kanan">
  <input id="leftText" placeholder="Teks kiri">
  <input id="username" placeholder="Nama untuk fusion">
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
let currentText = "";

class Particle{
  constructor(x,y){
    this.x=Math.random()*innerWidth;
    this.y=Math.random()*innerHeight;
    this.tx=x;
    this.ty=y;
    this.vx=0;
    this.vy=0;
  }
  update(){
    this.vx+=(this.tx-this.x)*0.07;
    this.vy+=(this.ty-this.y)*0.07;
    this.vx*=0.85;
    this.vy*=0.85;
    this.x+=this.vx;
    this.y+=this.vy;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fillStyle="#00ffff";
    ctx.fill();
  }
}

function createText(text){
  if(text===currentText) return;
  currentText=text;

  particles=[];
  ctx.clearRect(0,0,innerWidth,innerHeight);

  ctx.font="bold 90px Arial";
  ctx.textAlign="center";
  ctx.fillStyle="white";
  ctx.fillText(text,innerWidth/2,innerHeight/2);

  let data=ctx.getImageData(0,0,innerWidth,innerHeight).data;

  for(let y=0;y<innerHeight;y+=6){
    for(let x=0;x<innerWidth;x+=6){
      let i=(y*innerWidth+x)*4;
      if(data[i+3]>128){
        particles.push(new Particle(x,y));
      }
    }
  }
}

function spread(x,y){
  particles.forEach(p=>{
    p.tx=x+(Math.random()-0.5)*200;
    p.ty=y+(Math.random()-0.5)*200;
  });
}

function animate(){
  ctx.clearRect(0,0,innerWidth,innerHeight);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();

/* ===== HAND TRACKING ===== */

function isPinch(lm){
  let dx=lm[4].x-lm[8].x;
  let dy=lm[4].y-lm[8].y;
  return Math.sqrt(dx*dx+dy*dy)<0.045;
}

function handsClose(l1,l2){
  let dx=l1[0].x-l2[0].x;
  let dy=l1[0].y-l2[0].y;
  return Math.sqrt(dx*dx+dy*dy)<0.08;
}

const hands=new Hands({
  locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:2,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(results=>{
  if(!results.multiHandLandmarks) return;

  results.multiHandLandmarks.forEach((lm,i)=>{
    let handed=results.multiHandedness[i].label;
    let cx=lm[9].x*innerWidth;
    let cy=lm[9].y*innerHeight;

    if(isPinch(lm)){
      if(handed==="Right"){
        createText(document.getElementById("rightText").value);
      }
      if(handed==="Left"){
        createText(document.getElementById("leftText").value);
      }
    }else{
      spread(cx,cy);
    }
  });

  if(results.multiHandLandmarks.length===2){
    let l1=results.multiHandLandmarks[0];
    let l2=results.multiHandLandmarks[1];

    if(handsClose(l1,l2)){
      let name=document.getElementById("username").value;
      let now=new Date();
      let masehi=now.toLocaleDateString("id-ID");
      let hijri=new Intl.DateTimeFormat(
        'id-TN-u-ca-islamic',
        {day:'numeric',month:'long',year:'numeric'}
      ).format(now);

      createText(name+" • "+masehi+" • "+hijri);
    }
  }
});

const camera=new Camera(video,{
  onFrame:async()=>{await hands.send({image:video});},
  width:1280,
  height:720
});
camera.start();
</script>

</body>
</html>
