<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Text Stable</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.5;
  transform:scaleX(-1);
  filter:brightness(1.2);
}
canvas{
  position:fixed;
  top:0;
  left:0;
}
.controls{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:10px;
  padding:10px;
  background:rgba(0,0,0,0.8);
}
.controls input{
  flex:1;
  padding:8px;
  background:#111;
  border:1px solid #00ffff55;
  color:#0ff;
  border-radius:6px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="controls">
  <input id="rightText" placeholder="Teks kanan">
  <input id="leftText" placeholder="Teks kiri">
  <input id="username" placeholder="Nama fusion">
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function showText(text){
  if(!text) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ffff";
  ctx.font="bold 80px Arial";
  ctx.textAlign="center";
  ctx.fillText(text,canvas.width/2,canvas.height/2);
}

function isPinch(lm){
  const dx = lm[4].x - lm[8].x;
  const dy = lm[4].y - lm[8].y;
  return Math.sqrt(dx*dx+dy*dy) < 0.05;
}

function handsClose(l1,l2){
  const dx=l1[0].x-l2[0].x;
  const dy=l1[0].y-l2[0].y;
  return Math.sqrt(dx*dx+dy*dy) < 0.1;
}

const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands:2,
  modelComplexity:0,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(results=>{
  if(!results.multiHandLandmarks) return;

  results.multiHandLandmarks.forEach((lm,i)=>{
    const handed = results.multiHandedness[i].label;

    if(isPinch(lm)){
      if(handed==="Right"){
        showText(document.getElementById("rightText").value);
      }
      if(handed==="Left"){
        showText(document.getElementById("leftText").value);
      }
    }
  });

  if(results.multiHandLandmarks.length===2){
    if(handsClose(
      results.multiHandLandmarks[0],
      results.multiHandLandmarks[1]
    )){
      showText(document.getElementById("username").value);
    }
  }
});

const camera = new Camera(video,{
  onFrame: async () => {
    try{
      await hands.send({image:video});
    }catch(e){
      console.log("Frame skipped");
    }
  },
  width:640,
  height:480
});

camera.start();
</script>

</body>
</html>
