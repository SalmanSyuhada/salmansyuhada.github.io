<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.logo{font-size:22px;font-weight:600;}

.donate{
background:#ff7b00;
border:none;
padding:10px 18px;
border-radius:30px;
color:white;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:15px;
overflow:hidden;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{padding:18px;}

.prompt-result{
font-size:14px;
opacity:0.9;
margin-bottom:10px;
}

.buttons{display:flex;gap:10px;margin-top:10px;}

.btn{
border:none;
padding:8px 12px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.view{background:#00b4ff;color:white;}
.detail{background:#9333ea;color:white;}
.copy{background:#22c55e;color:white;}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:#1a1a1a;
width:90%;
max-width:800px;
border-radius:12px;
padding:20px;
}

.modal img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.prompt-box{
background:#111;
padding:12px;
border-radius:8px;
font-size:13px;
margin-top:10px;
white-space:pre-wrap;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

footer{
text-align:center;
padding:25px;
opacity:0.7;
}

</style>
</head>

<body>

<header>
<div class="logo">⚡ AI Prompt Gallery</div>
<button class="donate">☕ Donasi</button>
</header>

<section class="container" id="promptContainer"></section>

<!-- MODAL DETAIL -->

<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<img id="modalImage">

<h3 id="modalTitle"></h3>

<div class="prompt-box" id="modalPrompt"></div>

<div class="buttons" style="margin-top:15px;">
<button class="btn copy" onclick="copyPrompt()">Copy Prompt</button>
</div>

</div>
</div>

<footer>
© 2026 AI Prompt Gallery
</footer>

<script>

/* DATA PROMPT */

const prompts=[

{
id:1,
title:"AI Creator Cyberpunk",
image:"https://picsum.photos/800/500?random=1",
desc:"Poster sinematik creator AI berdiri di kota cyberpunk dengan hologram prompt.",
prompt:"A cinematic futuristic AI creator standing in a neon cyberpunk city, surrounded by floating holographic prompts, glowing particles, volumetric lighting, ultra detailed, cinematic poster, 8k render"
},

{
id:2,
title:"Chibi AI Creator",
image:"https://picsum.photos/800/500?random=2",
desc:"Ilustrasi chibi creator AI bekerja di laptop dengan hologram prompt.",
prompt:"Cute 3D chibi AI content creator working on laptop with floating holographic prompts, Pixar style, cinematic lighting, soft shadows, ultra detailed"
},

{
id:3,
title:"AI Marketing Poster",
image:"https://picsum.photos/800/500?random=3",
desc:"Poster marketing AI futuristik dengan teks Create With AI.",
prompt:"Futuristic AI marketing poster with glowing neon typography Create With AI, cyberpunk lighting, blue purple neon colors, ultra modern cinematic poster"
}

];


/* RENDER CARD */

const container=document.getElementById("promptContainer");

prompts.forEach(p=>{

container.innerHTML+=`
<div class="card">

<img src="${p.image}">

<div class="card-content">

<div class="prompt-result">${p.desc}</div>

<div class="buttons">
<button class="btn view" onclick="showPrompt(${p.id})">Lihat Prompt</button>

<a href="?id=${p.id}">
<button class="btn detail">Detail</button>
</a>

</div>

<div class="prompt-box" id="prompt${p.id}" style="display:none;">
${p.prompt}
</div>

</div>
</div>
`

});


/* LIHAT PROMPT */

function showPrompt(id){

let box=document.getElementById("prompt"+id);

box.style.display=box.style.display==="block"?"none":"block";

}


/* MODAL */

function openModal(data){

document.getElementById("modal").style.display="flex";

document.getElementById("modalImage").src=data.image;
document.getElementById("modalTitle").innerText=data.title;
document.getElementById("modalPrompt").innerText=data.prompt;

}


function closeModal(){
document.getElementById("modal").style.display="none";
}


/* COPY */

function copyPrompt(){

let text=document.getElementById("modalPrompt").innerText;

navigator.clipboard.writeText(text);

alert("Prompt berhasil dicopy!");

}


/* LOAD DETAIL VIA URL */

const urlParams=new URLSearchParams(window.location.search);
const id=urlParams.get("id");

if(id){

let data=prompts.find(p=>p.id==id);

if(data) openModal(data);

}

</script>

</body>
</html>
