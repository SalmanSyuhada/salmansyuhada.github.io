<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hand Particle Fusion</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
  color:#fff;
}

video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.25;
  transform:scaleX(-1);
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.guide{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  padding:15px;
  box-sizing:border-box;
}

.guide-group{
  margin-bottom:8px;
}

.guide input{
  padding:5px;
  margin-left:5px;
}

.social a{
  color:#fff;
  margin-right:10px;
  font-size:18px;
}

.guide-ticker{
  overflow:hidden;
  white-space:nowrap;
  margin-top:10px;
}

.ticker-track{
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="guide">
  <div class="guide-group">
      <b>Teks Tangan Kanan :</b>
      <input id="rightText" placeholder="Masukkan teks kanan">
  </div>

  <div class="guide-group">
      <b>Teks Tangan Kiri :</b>
      <input id="leftText" placeholder="Masukkan teks kiri">
  </div>

  <div class="guide-group fusion-preview">
      <span>Nama Pengguna :</span>
      <input id="username" placeholder="Nama Anda">
  </div>

  <div class="guide-group social">
      <a href="https://salmansyuhada.github.io" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://instagram.com/salmansyuhada" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="#" class="donate">
        <i class="fas fa-heart"></i>
        <span class="donate-text">Kirim Donasi</span>
      </a>
  </div>

  <div class="guide-ticker">
      <div class="ticker-track">
      Sistem ini menggunakan AI Hand Tracking berbasis browser. 
      Tangan terbuka = partikel menyebar. 
      Tangan mengepit = bentuk teks. 
      Gabungkan tangan = tampil nama + tanggal hijriyah & masehi.
      </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let fusionMode = false;

function Particle(x,y){
  this.x = x;
  this.y = y;
  this.vx = (Math.random()-0.5)*6;
  this.vy = (Math.random()-0.5)*6;
  this.tx = x;
  this.ty = y;
}

Particle.prototype.update = function(){
  this.x += (this.tx - this.x)*0.08;
  this.y += (this.ty - this.y)*0.08;
}

Particle.prototype.draw = function(){
  ctx.beginPath();
  ctx.arc(this.x,this.y,2,0,Math.PI*2);
  ctx.fillStyle="cyan";
  ctx.fill();
}

function createParticles(text){
  particles = [];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font="bold 120px Arial";
  ctx.fillText(text, canvas.width/2 - 300, canvas.height/2);
  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);

  for(let y=0;y<canvas.height;y+=6){
    for(let x=0;x<canvas.width;x+=6){
      let index = (y*canvas.width+x)*4;
      if(imageData.data[index+3] > 128){
        particles.push(new Particle(x,y));
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();

function isPinched(landmarks){
  let dx = landmarks[4].x - landmarks[8].x;
  let dy = landmarks[4].y - landmarks[8].y;
  return Math.sqrt(dx*dx+dy*dy) < 0.05;
}

function handsClose(l1,l2){
  let dx = l1[0].x - l2[0].x;
  let dy = l1[0].y - l2[0].y;
  return Math.sqrt(dx*dx+dy*dy) < 0.1;
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:2,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(results=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.multiHandLandmarks){
    results.multiHandLandmarks.forEach((landmarks,i)=>{
      drawConnectors(ctx, landmarks, HAND_CONNECTIONS,{color:'#00FF00'});
      drawLandmarks(ctx, landmarks,{color:'#FF0000', radius:3});

      let handedness = results.multiHandedness[i].label;
      let pinched = isPinched(landmarks);

      if(handedness==="Right"){
        if(pinched){
          createParticles(document.getElementById("rightText").value);
        }
      }

      if(handedness==="Left"){
        if(pinched){
          createParticles(document.getElementById("leftText").value);
        }
      }
    });

    if(results.multiHandLandmarks.length===2){
      let l1 = results.multiHandLandmarks[0];
      let l2 = results.multiHandLandmarks[1];
      if(handsClose(l1,l2)){
        let name = document.getElementById("username").value;
        let now = new Date();
        let masehi = now.toLocaleDateString("id-ID");
        let hijri = new Intl.DateTimeFormat('id-TN-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(now);
        createParticles(name + " | " + masehi + " | " + hijri);
      }
    }
  }
});

const camera = new Camera(video,{
  onFrame: async()=>{
    await hands.send({image:video});
  },
  width:1280,
  height:720
});
camera.start();
</script>

</body>
</html>
