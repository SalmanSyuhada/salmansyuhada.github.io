<body>

<script>
/*
========================================
 AI-Explorer Engine
 Created by SalmanSyuhada
 © 2026 All Rights Reserved
 Unauthorized use is prohibited
========================================
*/

let scene,camera,renderer,particleSystem
let targetPositions=[]

let lastTime = 0

const PARTICLE_COUNT=5000

let currentTextIndex=-1
let isFist=false

let handPos={x:0,y:0}
let prevHandPos={x:0,y:0}
let handVelocity={x:0,y:0}

let handSkeletonGroup
let handJoints=[]
let handLines=[]

/* PESAN DARI USER */

function getMessages(){

return[
document.getElementById("msg1").value || "",
document.getElementById("msg2").value || "",
document.getElementById("msg3").value || "",
document.getElementById("msg4").value || "",
document.getElementById("msg5").value || ""
]

}

const textCanvas=document.createElement("canvas")
const tCtx=textCanvas.getContext("2d")

textCanvas.width=1024
textCanvas.height=512

function initThree(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=8

renderer=new THREE.WebGLRenderer({antialias:true,alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

/* PARTIKEL */

const geometry=new THREE.BufferGeometry()

const positions=new Float32Array(PARTICLE_COUNT*3)
const colors=new Float32Array(PARTICLE_COUNT*3)

for(let i=0;i<PARTICLE_COUNT;i++){

positions[i*3]=(Math.random()-0.5)*20
positions[i*3+1]=(Math.random()-0.5)*20
positions[i*3+2]=(Math.random()-0.5)*10

colors[i*3]=0.3
colors[i*3+1]=0.6
colors[i*3+2]=1

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

const material=new THREE.PointsMaterial({

size:0.035,
vertexColors:true,
transparent:true,
opacity:0.8,
blending:THREE.AdditiveBlending

})

particleSystem=new THREE.Points(geometry,material)

scene.add(particleSystem)

window.addEventListener("resize",onWindowResize)

}

function onWindowResize(){

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

}

/* MEMBUAT TARGET TEKS */

function createTextTarget(text){

tCtx.clearRect(0,0,textCanvas.width,textCanvas.height)

tCtx.fillStyle="white"

tCtx.font="bold 70px sans-serif"
tCtx.textAlign="center"
tCtx.textBaseline="middle"

tCtx.fillText(text,textCanvas.width/2,textCanvas.height/2)

const imageData=tCtx.getImageData(
0,0,textCanvas.width,textCanvas.height
)

const points=[]

for(let y=0;y<textCanvas.height;y+=3){

for(let x=0;x<textCanvas.width;x+=3){

if(imageData.data[(y*textCanvas.width+x)*4+3]>120){

points.push({

x:(x-textCanvas.width/2)*0.018,
y:-(y-textCanvas.height/2)*0.018

})

}

}

}

targetPositions=[]

for(let i=0;i<PARTICLE_COUNT;i++){

if(points.length>0){

const p=points[i%points.length]

targetPositions.push(
p.x,
p.y,
(Math.random()-0.5)*0.1
)

}else{

targetPositions.push(
(Math.random()-0.5)*15,
(Math.random()-0.5)*15,
0
)

}

}

tCtx.fillStyle="rgba(255,255,255,0.15)"
tCtx.font="bold 20px sans-serif"
tCtx.fillText("AI-Explorer", textCanvas.width-120, textCanvas.height-20)

}

setInterval(()=>{
  document.getElementById("watermark").style.opacity =
    0.2 + Math.random()*0.2
},2000)

/* ANIMASI */

function animate(){

requestAnimationFrame(animate)

const positions=
particleSystem.geometry.attributes.position.array

const colors=
particleSystem.geometry.attributes.color.array

const time=Date.now()*0.001

for(let i=0;i<PARTICLE_COUNT;i++){

const i3=i*3

if(isFist){

positions[i3]+=(handPos.x-positions[i3])*0.05
positions[i3+1]+=(handPos.y-positions[i3+1])*0.05

}else if(targetPositions.length>0){

positions[i3]+=(targetPositions[i3]-positions[i3])*0.12
positions[i3+1]+=(targetPositions[i3+1]-positions[i3+1])*0.12
positions[i3+2]+=(targetPositions[i3+2]-positions[i3+2])*0.12

}

}

particleSystem.geometry.attributes.position.needsUpdate=true

renderer.render(scene,camera)

}

/* MEDIAPIPE */

const videoElement=document.getElementById("input_video")
const statusLabel=document.getElementById("gesture-status")

function onResults(results){

let count = 0
let handDetected = false

if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0){

  const landmarks = results.multiHandLandmarks[0]

  // ✅ DETEKSI TANGAN KANAN (pakai bawaan MediaPipe jika ada)
  let isRightHand = true

  if(results.multiHandedness && results.multiHandedness.length > 0){
    isRightHand = results.multiHandedness[0].label === "Right"
  }else{
    // fallback jika tidak ada handedness
    isRightHand = landmarks[17].x < landmarks[5].x
  }

  // ❌ ABAIKAN JIKA BUKAN TANGAN KANAN
  if(!isRightHand){
    isFist = false
    currentTextIndex = -1
    statusLabel.innerText = "Gunakan tangan kiri"
    return
  }

  handDetected = true

  // ✅ SMOOTH HAND POSITION
  const targetX = -(landmarks[9].x - 0.5) * 16
  const targetY = -(landmarks[9].y - 0.5) * 12

  handPos.x += (targetX - handPos.x) * 0.2
  handPos.y += (targetY - handPos.y) * 0.2

  const threshold = 0.02

  // =========================
  // 👍 IBU JARI (FIX STABIL)
  // =========================

  const thumbTip = landmarks[4]
  const thumbIP  = landmarks[3]
  const indexMCP = landmarks[5]

  const distTip = Math.hypot(
    thumbTip.x - indexMCP.x,
    thumbTip.y - indexMCP.y
  )

  const distIP = Math.hypot(
    thumbIP.x - indexMCP.x,
    thumbIP.y - indexMCP.y
  )

  // 👉 hanya dianggap terbuka jika benar-benar menjauh dari telapak
  if(distTip > distIP + threshold){
    count++
  }

  // =========================
  // ☝️ 4 JARI LAIN (VERTIKAL)
  // =========================

  const fingers = [8,12,16,20]

  for(let i=0;i<fingers.length;i++){
    const tip = fingers[i]
    const pip = fingers[i] - 2

    if(landmarks[tip].y < landmarks[pip].y - threshold){
      count++
    }
  }

}

if(handDetected){

  if(count === 0){

    isFist = true
    statusLabel.innerText = "Kepalan Tangan"

  }else{

    isFist = false

    const messages = getMessages()
    const msgIndex = (count > 0 && count <= 5) ? count - 1 : -1

    statusLabel.innerText = count + " jari terdeteksi"

    // ✅ ANTI FLICKER (tidak render berulang)
    if(msgIndex !== -1 && msgIndex !== currentTextIndex){

      currentTextIndex = msgIndex
      createTextTarget(messages[msgIndex])

    }

  }

}else{

  isFist = false
  currentTextIndex = -1
  statusLabel.innerText = "Menunggu tangan..."

}

}

console.log("%cAI-Explorer © SalmanSyuhada",
"color:#3b82f6;font-size:14px;font-weight:bold")


const hands=new Hands({

locateFile:(file)=>
`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`

})

hands.setOptions({

maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7

})

hands.onResults(onResults)

if(!window.__AI_EXPLORER){
  window.__AI_EXPLORER = true
}

const cameraFeed=new Camera(videoElement,{

onFrame: async () => {
  const now = Date.now()
  if (now - lastTime > 50) { // 20 FPS saja cukup
    await hands.send({ image: videoElement })
    lastTime = now
  }
},

width:640,
height:480

})

window.onload=()=>{

initThree()
animate()
    cameraFeed.start()
    .then(()=>{
    document.getElementById("loading-screen").style.display="none"
    console.log("Camera started ✅")
    })
    .catch(err=>{
    console.error("Camera error:", err)
    alert("Kamera tidak bisa diakses. Izinkan kamera di browser.")
    })
}

</script>
</body>
