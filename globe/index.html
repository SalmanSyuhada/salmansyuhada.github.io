<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracked Globe - Follow Palm</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.25;
    z-index:0;
}
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
}
#info{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    text-align:center;
    font-size:14px;
    z-index:2;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<div id="info">
<b>Panduan:</b><br>
✋ Tangan kiri telapak ke atas = Globe mengikuti tangan<br>
✊ Tangan kiri menggenggam = Globe terkunci<br>
🤲 Tangan kanan = Putar globe<br>
🤏 Pinch tangan kanan = Zoom
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream);

//////////////////////////////////////////////////
// THREE SCENE
//////////////////////////////////////////////////
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.SphereGeometry(1.5,64,64);
const texture = new THREE.TextureLoader().load(
'https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg'
);
const material = new THREE.MeshStandardMaterial({map:texture});
const globe = new THREE.Mesh(geometry,material);
scene.add(globe);

const light = new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

//////////////////////////////////////////////////
// VARIABLES
//////////////////////////////////////////////////
let globeLocked = false;
let followPalm = false;

let targetPos = new THREE.Vector3(0,0,0);
let targetRotX = 0;
let targetRotY = 0;
let targetZoom = 6;

//////////////////////////////////////////////////
// MEDIAPIPE
//////////////////////////////////////////////////
const hands = new Hands({
    locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.8,
    minTrackingConfidence:0.8
});

hands.onResults(results=>{
    if(!results.multiHandLandmarks) return;

    results.multiHandLandmarks.forEach((landmarks,i)=>{

        const handedness = results.multiHandedness[i].label;
        const wrist = landmarks[0];
        const middleMCP = landmarks[9];
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];

        //////////////////////////////////////////////////
        // LEFT HAND - FOLLOW POSITION
        //////////////////////////////////////////////////
        if(handedness === "Left"){

            // Deteksi fist
            const middleTip = landmarks[12];
            const dist = Math.abs(middleTip.y - wrist.y);
            globeLocked = dist < 0.08;

            // Deteksi telapak menghadap atas
            const palmUp = middleMCP.y < wrist.y;

            followPalm = palmUp && !globeLocked;

            if(followPalm){
                const x = (wrist.x - 0.5) * 8;
                const y = -(wrist.y - 0.5) * 6;
                targetPos.set(x,y,0);
            }
        }

        //////////////////////////////////////////////////
        // RIGHT HAND - ROTATE + ZOOM
        //////////////////////////////////////////////////
        if(handedness === "Right" && !globeLocked){

            targetRotY = (indexTip.x - 0.5) * 5;
            targetRotX = (indexTip.y - 0.5) * 5;

            const pinchDist = Math.hypot(
                thumbTip.x - indexTip.x,
                thumbTip.y - indexTip.y
            );

            targetZoom = 6 - (1 - pinchDist) * 3;
        }

    });
});

const cam = new Camera(video,{
    onFrame: async ()=>{ await hands.send({image:video}); },
    width:640,
    height:480
});
cam.start();

//////////////////////////////////////////////////
// ANIMATION LOOP
//////////////////////////////////////////////////
function animate(){
    requestAnimationFrame(animate);

    if(followPalm){
        globe.position.lerp(targetPos,0.2);
    }

    globe.rotation.y += (targetRotY - globe.rotation.y)*0.1;
    globe.rotation.x += (targetRotX - globe.rotation.x)*0.1;

    camera.position.z += (targetZoom - camera.position.z)*0.1;

    renderer.render(scene,camera);
}
animate();

//////////////////////////////////////////////////
window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
