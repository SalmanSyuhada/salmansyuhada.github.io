<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber AI Signature - Clean Preview</title>

<style>
body{
    margin:0;
    background:#050816;
    font-family:monospace;
    color:#00ffff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

.stage{
    position:relative;
    width:800px;
    height:600px;
}

video, canvas{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:15px;
}

video{
    opacity:0.35; /* Kamera transparan */
    transform: scaleX(-1);
}

#drawCanvas{
    pointer-events:none;
}

#detectCanvas{
    pointer-events:none;
}

.button-bar{
    margin-top:15px;
    display:flex;
    gap:15px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    background:#444;
    color:#aaa;
}

.panel{
    margin-top:25px;
    width:800px;
    background:#0c1022;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #00ffff33;
}

.feature-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    font-size:14px;
}

.status{
    margin-top:10px;
    padding:8px;
    background:#111;
    border-radius:8px;
}
</style>
</head>
<body>

<h2>⚡ CYBER AI SIGNATURE SYSTEM</h2>

<div class="stage">
    <video id="video" autoplay playsinline></video>
    <canvas id="drawCanvas" width="800" height="600"></canvas>
    <canvas id="detectCanvas" width="800" height="600"></canvas>
</div>

<div class="button-bar">
    <button id="startBtn" onclick="startWriting()">MULAI MENULIS</button>
    <button onclick="clearCanvas()">CLEAR</button>
    <button onclick="generateHash()">GENERATE HASH</button>
    <button onclick="runOCR()">OCR</button>
</div>

<div class="panel">
<h3>🧠 Cara Menggunakan</h3>

<div class="feature-grid">
<div>▶ Klik <b>MULAI MENULIS</b> untuk aktifkan mode gambar</div>
<div>✊ Kepal tangan → Stop menulis</div>
<div>✌ 2 Jari → Ganti warna neon</div>
<div>⚡ Kecepatan gerak → Efek tekanan pena</div>
<div>🔐 Generate Hash → SHA-256 integritas tanda tangan</div>
<div>📝 OCR → Konversi tulisan menjadi teks</div>
</div>

<div class="status">
Status: <span id="statusText">OFF</span>
</div>

<div id="result" style="margin-top:10px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
const video=document.getElementById("video");
const drawCanvas=document.getElementById("drawCanvas");
const detectCanvas=document.getElementById("detectCanvas");

const drawCtx=drawCanvas.getContext("2d");
const detectCtx=detectCanvas.getContext("2d");

let drawing=false;
let systemActive=false;
let prevX=null, prevY=null;
let currentColor="#00ffff";

function startWriting(){
    systemActive=true;
    drawing=true;
    document.getElementById("startBtn").disabled=true;
    document.getElementById("statusText").innerText="ON";
}

function clearCanvas(){
    drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    drawing=false;
    systemActive=false;
    prevX=null;
    prevY=null;
    document.getElementById("startBtn").disabled=false;
    document.getElementById("statusText").innerText="OFF";
    document.getElementById("result").innerText="";
}

function isFist(lm){
    return lm[8].y>lm[6].y && lm[12].y>lm[10].y;
}

function isTwoFinger(lm){
    return lm[8].y<lm[6].y && lm[12].y<lm[10].y;
}

const hands=new Hands({
    locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(results=>{

    detectCtx.clearRect(0,0,detectCanvas.width,detectCanvas.height);

    if(results.multiHandLandmarks.length>0){

        const lm=results.multiHandLandmarks[0];

        drawConnectors(detectCtx,lm,HAND_CONNECTIONS,
            {color:'#00ff88',lineWidth:2});
        drawLandmarks(detectCtx,lm,
            {color:'#ff00ff',lineWidth:2});

        if(!systemActive) return;

        const index=lm[8];
        const x=(1-index.x)*drawCanvas.width;
        const y=index.y*drawCanvas.height;

        if(isFist(lm)) drawing=false;

        if(isTwoFinger(lm)){
            currentColor=currentColor=="#00ffff"?"#ff00ff":"#00ffff";
        }

        if(drawing){
            if(prevX!==null){
                let speed=Math.hypot(x-prevX,y-prevY);
                let pressure=Math.max(2,10-speed/5);

                drawCtx.lineWidth=pressure;
                drawCtx.lineCap="round";
                drawCtx.strokeStyle=currentColor;
                drawCtx.shadowColor=currentColor;
                drawCtx.shadowBlur=20;

                drawCtx.beginPath();
                drawCtx.moveTo(prevX,prevY);
                drawCtx.lineTo(x,y);
                drawCtx.stroke();
            }
            prevX=x; prevY=y;
        }
    }
});

const camera=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:800,height:600
});
camera.start();

async function generateHash(){
    const dataURL=drawCanvas.toDataURL();
    const msg=new TextEncoder().encode(dataURL);
    const hashBuffer=await crypto.subtle.digest('SHA-256',msg);
    const hashArray=Array.from(new Uint8Array(hashBuffer));
    const hashHex=hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
    document.getElementById("result").innerText="SHA-256: "+hashHex;
}

async function runOCR(){
    document.getElementById("result").innerText="Processing OCR...";
    const result=await Tesseract.recognize(drawCanvas.toDataURL(),'eng');
    document.getElementById("result").innerText="OCR: "+result.data.text;
}
</script>

</body>
</html>
