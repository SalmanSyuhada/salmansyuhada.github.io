<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Fire Energy</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center,#050510,#000);
    font-family:Arial, sans-serif;
    color:white;
}

video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.25; /* Kamera transparan */
    transform: scaleX(-1);
}

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.guide{
    flex-wrap:wrap;
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:12px 30px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-sizing:border-box;
    font-size:13px;
}

.guide-ticker{
    width:100%;
    overflow:hidden;
    border-top:1px solid rgba(255,255,255,0.1);
    margin-top:8px;
    padding-top:6px;
}

/* Track bergerak */
.ticker-track{
    display:inline-block;
    white-space:nowrap;
    animation:scrollText 20s linear infinite;
    font-size:12px;
    opacity:0.8;
    letter-spacing:0.5px;
}

/* Animasi smooth */
@keyframes scrollText{
    0%{transform:translateX(100%);}
    100%{transform:translateX(-100%);}
}

.guide-group{
    display:flex;
    align-items:center;
    gap:10px;
}

.guide select{
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.4);
    color:white;
    padding:6px 12px;
    border-radius:8px;
    outline:none;
    cursor:pointer;
    transition:0.3s;
}

.guide select:hover{
    box-shadow:0 0 8px rgba(0,255,255,0.8);
    border-color:rgba(0,255,255,0.8);
}

.guide select:focus{
    box-shadow:0 0 12px rgba(255,0,255,0.9);
    border-color:rgba(255,0,255,0.9);
}

.fusion-preview{
    gap:10px;
}

#fusionColorBox{
    width:35px;
    height:35px;
    border-radius:8px;
    background:purple;
    box-shadow:0 0 15px purple;
    transition:0.3s;
}

.fusion-info{
    opacity:0.85;
}

.social a{
    color:white;
    font-size:18px;
    margin-left:10px;
    transition:0.3s;
    text-decoration:none;
}

.social a:hover{
    transform:translateY(-3px);
}

.social a .fa-github:hover{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
}

.social a .fa-instagram:hover{
    color:#ff00ff;
    text-shadow:0 0 10px #ff00ff;
}

.social a .fa-youtube:hover{
    color:#ff0000;
    text-shadow:0 0 10px #ff0000;
}

.donate{
    color:#ff4d6d;
}

.donate:hover{
    text-shadow:0 0 12px #ff4d6d;
    transform:scale(1.2);
}

.donate{
    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
    color:#ff4d6d;
    font-size:18px;
    text-decoration:none;
    animation:wiggle 2s infinite ease-in-out;
    transition:0.3s;
}

/* Animasi goyang halus */
@keyframes wiggle{
    0%{transform:rotate(0deg);}
    25%{transform:rotate(-8deg);}
    50%{transform:rotate(8deg);}
    75%{transform:rotate(-5deg);}
    100%{transform:rotate(0deg);}
}

.donate:hover{
    text-shadow:0 0 15px #ff4d6d;
    transform:scale(1.2);
}

/* Text Info */
.donate-text{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.8);
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    box-shadow:0 0 10px #ff4d6d;
}

.donate:hover .donate-text{
    opacity:1;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="guide">

  <div class="guide-group">
      <b>🔥 Right</b>
      <select id="rightColor">
          <option value="255,50,0">Red</option>
          <option value="255,140,0">Orange</option>
          <option value="255,255,0">Yellow</option>
          <option value="0,255,100">Green</option>
          <option value="255,0,255">Magenta</option>
      </select>
  </div>

  <div class="guide-group">
      <b>❄ Left</b>
      <select id="leftColor">
          <option value="0,150,255">Blue</option>
          <option value="0,255,255">Cyan</option>
          <option value="180,0,255">Purple</option>
          <option value="255,255,255">White</option>
          <option value="0,255,120">Mint</option>
      </select>
  </div>

  <div class="guide-group fusion-preview">
      <span>Result : </span>
      <div id="fusionColorBox"></div>
  </div>

  <div class="guide-group social">
      <a href="https://salmansyuhada.github.io" target="_blank"><i class="fab fa-github"></i></a>
      <a href="https://instagram.com/salmansyuhada" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="#" class="donate">
        <i class="fas fa-heart"></i>
        <span class="donate-text">Kirim Donasi</span>
      </a>
  </div>

  <div class="guide-ticker">
      <div class="ticker-track">
          Sistem ini menggunakan AI Hand Tracking berbasis browser.
          🔥 Buka tangan kanan untuk mengaktifkan energi • 
          ❄ Buka tangan kiri untuk energi kedua • 
          🤝 Dekatkan kedua tangan untuk mengaktifkan Fusion Mode • 
          ⚡ Sangat dekat akan memicu Energy Beam • 
      </div>
  </div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rightFire = {x:0,y:0,active:false,intensity:0};
let leftFire = {x:0,y:0,active:false,intensity:0};

function smooth(current, target, factor=0.2){
    return current + (target-current)*factor;
}

function isHandOpen(landmarks){
    let tip = landmarks[8];
    let pip = landmarks[6];
    return tip.y < pip.y;
}

function drawFire(x,y,colorRGB,intensity){
    if(intensity <= 0.05) return;

    let radius = 80 * intensity;
    let gradient = ctx.createRadialGradient(x,y,0,x,y,radius);
    gradient.addColorStop(0,`rgba(${colorRGB},0.95)`);
    gradient.addColorStop(1,"transparent");

    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x,y,radius,0,Math.PI*2);
    ctx.fill();
}

function blendEffect(){
    let dx = rightFire.x - leftFire.x;
    let dy = rightFire.y - leftFire.y;
    let dist = Math.sqrt(dx*dx+dy*dy);

    let mixed = mixColors(rightColor, leftColor);
    let fusionColor = `rgba(${mixed[0]},${mixed[1]},${mixed[2]},0.9)`;

    // Fusion glow
    if(dist < 200 && rightFire.active && leftFire.active){
        let midX = (rightFire.x+leftFire.x)/2;
        let midY = (rightFire.y+leftFire.y)/2;

        let gradient = ctx.createRadialGradient(midX,midY,0,midX,midY,150);
        gradient.addColorStop(0,fusionColor);
        gradient.addColorStop(1,"transparent");

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(midX,midY,150,0,Math.PI*2);
        ctx.fill();
    }

    // ENERGY BEAM MODE 🔥⚡
    if(dist < 80 && rightFire.active && leftFire.active){
        ctx.strokeStyle = fusionColor;
        ctx.lineWidth = 15;
        ctx.shadowBlur = 30;
        ctx.shadowColor = fusionColor;

        ctx.beginPath();
        ctx.moveTo(rightFire.x, rightFire.y);
        ctx.lineTo(leftFire.x, leftFire.y);
        ctx.stroke();

        ctx.shadowBlur = 0;
    }
}

const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

let rightColor = "255,50,0";
let leftColor = "0,150,255";

document.getElementById("rightColor").addEventListener("change", e=>{
    rightColor = e.target.value;
    updateFusionPreview();
});

document.getElementById("leftColor").addEventListener("change", e=>{
    leftColor = e.target.value;
    updateFusionPreview();
});

updateFusionPreview();

function mixColors(rgb1, rgb2){
    let c1 = rgb1.split(',').map(Number);
    let c2 = rgb2.split(',').map(Number);

    let mixed = [
        Math.floor((c1[0]+c2[0])/2),
        Math.floor((c1[1]+c2[1])/2),
        Math.floor((c1[2]+c2[2])/2)
    ];

    return mixed;
}

function updateFusionPreview(){
    let mixed = mixColors(rightColor, leftColor);
    let color = `rgb(${mixed[0]},${mixed[1]},${mixed[2]})`;

    const box = document.getElementById("fusionColorBox");
    box.style.background = color;
    box.style.boxShadow = `0 0 20px ${color}`;
}

hands.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(results.multiHandLandmarks){
        results.multiHandLandmarks.forEach((landmarks,index)=>{
            const handedness = results.multiHandedness[index].label;

            let wrist = landmarks[0];
            let x = canvas.width - (wrist.x * canvas.width);
            let y = wrist.y * canvas.height;

            let open = isHandOpen(landmarks);

            if(handedness === "Right"){
                rightFire.x = smooth(rightFire.x,x);
                rightFire.y = smooth(rightFire.y,y);
                rightFire.active = open;
                rightFire.intensity = smooth(rightFire.intensity, open?1:0);
            } else {
                leftFire.x = smooth(leftFire.x,x);
                leftFire.y = smooth(leftFire.y,y);
                leftFire.active = open;
                leftFire.intensity = smooth(leftFire.intensity, open?1:0);
            }
        });
    }

    drawFire(rightFire.x,rightFire.y,rightColor,rightFire.intensity);
    drawFire(leftFire.x,leftFire.y,leftColor,leftFire.intensity);
    blendEffect();
});

const camera = new Camera(video,{
    onFrame: async()=>{
        await hands.send({image:video});
    },
    width:1280,
    height:720
});
camera.start();
</script>

</body>
</html>
