<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firewall Defender - Pro Vision</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
    background:#000;
    color:#0ff;
}

/* CAMERA LAYER */
#video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.25; /* transparan */
    transform:scaleX(-1); /* mirror */
    filter:contrast(1.2) brightness(0.8) saturate(1.2);
    z-index:0;
}

/* CANVAS GAME LAYER */
canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:1;
}

/* UI */
#ui{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:2;
    animation:fadeIn 1.5s ease;
}

h1{
    margin:0;
    font-size:28px;
    letter-spacing:4px;
    text-shadow:0 0 15px #0ff;
}

#score{
    margin-top:10px;
    font-size:18px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translate(-50%,-20px);}
    to{opacity:1; transform:translate(-50%,0);}
}
</style>
</head>
<body>

<div id="ui">
    <h1>FIREWALL DEFENDER</h1>
    <div id="score">Score: 0</div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0;
let viruses=[];
let shieldX=canvas.width/2;
let smoothX=shieldX;
let shieldActive=false;
let deepMode=false;

const smoothFactor=0.15;

/* Spawn Virus */
function spawnVirus(){
    viruses.push({
        x:Math.random()*canvas.width,
        y:-20,
        size:20+Math.random()*15,
        speed:2+Math.random()*3
    });
}
setInterval(spawnVirus,800);

/* Draw Shield */
function drawShield(){
    if(!shieldActive) return;

    ctx.beginPath();
    ctx.arc(smoothX,canvas.height-120,60,0,Math.PI*2);
    ctx.fillStyle=deepMode?"rgba(255,0,255,0.3)":"rgba(0,255,255,0.3)";
    ctx.fill();
    ctx.strokeStyle="#0ff";
    ctx.lineWidth=4;
    ctx.stroke();
}

/* Draw Virus */
function drawViruses(){
    viruses.forEach((v,i)=>{
        v.y+=deepMode?v.speed*0.5:v.speed;

        ctx.beginPath();
        ctx.arc(v.x,v.y,v.size,0,Math.PI*2);
        ctx.fillStyle="red";
        ctx.shadowColor="red";
        ctx.shadowBlur=15;
        ctx.fill();
        ctx.shadowBlur=0;

        let dx=v.x-smoothX;
        let dy=v.y-(canvas.height-120);
        let dist=Math.sqrt(dx*dx+dy*dy);

        if(shieldActive && dist<v.size+60){
            viruses.splice(i,1);
            score++;
            document.getElementById("score").innerText="Score: "+score;
        }

        if(v.y>canvas.height){
            viruses.splice(i,1);
        }
    });
}

/* Animate */
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    smoothX+=(shieldX-smoothX)*smoothFactor;

    drawShield();
    drawViruses();

    requestAnimationFrame(animate);
}
animate();

/* MEDIA PIPE */
const hands=new Hands({
    locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.75,
    minTrackingConfidence:0.75
});

hands.onResults(results=>{
    if(results.multiHandLandmarks.length>0){
        const lm=results.multiHandLandmarks[0];

        let palm=lm[9];
        shieldX=(1-palm.x)*canvas.width; // mirror sync

        let open=lm[8].y<lm[6].y;
        let fist=lm[8].y>lm[6].y;

        shieldActive=open;
        deepMode=fist;
    }else{
        shieldActive=false;
        deepMode=false;
    }
});

const camera=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:640,
    height:480
});
camera.start();
</script>
</body>
</html>
