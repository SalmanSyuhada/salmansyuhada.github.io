<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Axtarget - Gesture Partikel 3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:'Inter',sans-serif;
}

canvas{
display:block;
position:absolute;
top:0;
left:0;
z-index:2;
}

/* Kamera transparan */
#input_video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
transform:scaleX(-1);
z-index:1;
}

/* UI */
#ui-layer{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:5;
pointer-events:none;
}

.status-badge{
background:rgba(0,0,0,0.7);
padding:8px 15px;
border-radius:20px;
border:1px solid rgba(59,130,246,0.3);
backdrop-filter:blur(8px);
}

/* Loading */
#loading-screen{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:100;
color:white;
}

</style>
</head>

<body>

<div id="loading-screen">
<div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 mb-4"></div>
<p class="text-xl font-light italic">Memuat Sistem 3D Axtarget...</p>
</div>

<div id="ui-layer">
<h1 class="text-3xl font-black mb-2 tracking-tighter text-blue-500">AXTARGET</h1>

<div class="status-badge inline-block">
Status :
<span id="gesture-status" class="font-mono text-blue-400 text-xl">
Menunggu sistem...
</span>
</div>

</div>

<video id="input_video" autoplay playsinline></video>

<script>

let scene,camera,renderer,particleSystem
let targetPositions=[]

const PARTICLE_COUNT=15000

let currentTextIndex=-1
let isFist=false

let handPos=new THREE.Vector3(0,0,0)
let prevHandPos=new THREE.Vector3(0,0,0)

let handSkeletonGroup
let handJoints=[]
let handLines=[]

/* Pesan */
const messages=[
"Mencari Followers?",
"100 Followers - Rp250",
"Mencari Like?",
"100 Like - Rp30",
"Kunjungi AxtarGet.xyz"
]

const textCanvas=document.createElement("canvas")
const tCtx=textCanvas.getContext("2d")

textCanvas.width=1024
textCanvas.height=512

function initThree(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=8

renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2))

document.body.appendChild(renderer.domElement)

const geometry=new THREE.BufferGeometry()

const positions=new Float32Array(PARTICLE_COUNT*3)
const colors=new Float32Array(PARTICLE_COUNT*3)
const initialPos=new Float32Array(PARTICLE_COUNT*3)

for(let i=0;i<PARTICLE_COUNT;i++){

const x=(Math.random()-0.5)*20
const y=(Math.random()-0.5)*20
const z=(Math.random()-0.5)*10

positions[i*3]=x
positions[i*3+1]=y
positions[i*3+2]=z

initialPos[i*3]=x
initialPos[i*3+1]=y
initialPos[i*3+2]=z

colors[i*3]=0.3
colors[i*3+1]=0.6
colors[i*3+2]=1

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

geometry.setAttribute(
"initialPos",
new THREE.BufferAttribute(initialPos,3)
)

const material=new THREE.PointsMaterial({
size:0.035,
vertexColors:true,
transparent:true,
opacity:0.8,
blending:THREE.AdditiveBlending
})

particleSystem=new THREE.Points(geometry,material)

scene.add(particleSystem)

/* Skeleton tangan */

handSkeletonGroup=new THREE.Group()
scene.add(handSkeletonGroup)

for(let i=0;i<21;i++){

const sphere=new THREE.Mesh(
new THREE.SphereGeometry(0.06,8,8),
new THREE.MeshBasicMaterial({color:0x3b82f6})
)

sphere.visible=false
handJoints.push(sphere)
handSkeletonGroup.add(sphere)

}

const connections=[
[0,1,2,3,4],
[0,5,6,7,8],
[5,9,10,11,12],
[9,13,14,15,16],
[13,17,18,19,20],
[0,17]
]

connections.forEach(path=>{

const points=[]

for(let i=0;i<path.length;i++)
points.push(new THREE.Vector3())

const lineGeom=new THREE.BufferGeometry().setFromPoints(points)

const line=new THREE.Line(
lineGeom,
new THREE.LineBasicMaterial({
color:0x60a5fa,
transparent:true,
opacity:0.5
})
)

line.visible=false

handLines.push({line,path})
handSkeletonGroup.add(line)

})

window.addEventListener("resize",onWindowResize)

}

function onWindowResize(){

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

}

/* Membuat target teks dari partikel */

function createTextTarget(text){

tCtx.clearRect(0,0,textCanvas.width,textCanvas.height)

tCtx.fillStyle="white"
tCtx.font="bold 70px sans-serif"

tCtx.textAlign="center"
tCtx.textBaseline="middle"

tCtx.fillText(text,textCanvas.width/2,textCanvas.height/2)

const imageData=tCtx.getImageData(
0,0,textCanvas.width,textCanvas.height
)

const points=[]

for(let y=0;y<textCanvas.height;y+=3){

for(let x=0;x<textCanvas.width;x+=3){

if(imageData.data[(y*textCanvas.width+x)*4+3]>120){

points.push({
x:(x-textCanvas.width/2)*0.018,
y:-(y-textCanvas.height/2)*0.018
})

}

}

}

targetPositions=[]

for(let i=0;i<PARTICLE_COUNT;i++){

const p=points[i%points.length]

targetPositions.push(
p.x,
p.y,
(Math.random()-0.5)*0.1
)

}

}

/* Animasi partikel */

function animate(){

requestAnimationFrame(animate)

const positions=particleSystem.geometry.attributes.position.array

for(let i=0;i<PARTICLE_COUNT;i++){

const i3=i*3

if(targetPositions.length>0){

positions[i3]+=(targetPositions[i3]-positions[i3])*0.1
positions[i3+1]+=(targetPositions[i3+1]-positions[i3+1])*0.1
positions[i3+2]+=(targetPositions[i3+2]-positions[i3+2])*0.1

}

}

particleSystem.geometry.attributes.position.needsUpdate=true

renderer.render(scene,camera)

}

const videoElement=document.getElementById("input_video")
const statusLabel=document.getElementById("gesture-status")

function onResults(results){

let count=0

if(results.multiHandLandmarks){

const landmarks=results.multiHandLandmarks[0]

const tipIds=[4,8,12,16,20]

for(let i=1;i<5;i++){

if(landmarks[tipIds[i]].y<
landmarks[tipIds[i]-2].y) count++

}

}

if(count===0){

statusLabel.innerText="Kepalan Tangan"

}else{

statusLabel.innerText=count+" Jari Aktif"

if(count>=1 && count<=5){

createTextTarget(messages[count-1])

}

}

}

/* MediaPipe */

const hands=new Hands({
locateFile:file=>
`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(onResults)

const cameraFeed=new Camera(videoElement,{
onFrame:async()=>{
await hands.send({image:videoElement})
},
width:640,
height:480
})

window.onload=()=>{

initThree()
animate()

cameraFeed.start().then(()=>{

document.getElementById("loading-screen").style.display="none"

})

}

</script>

</body>
</html>
